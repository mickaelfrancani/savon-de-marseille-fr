<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <style>
      .logo-text { font-family: Georgia, serif; }
      .logo-sub  { font-family: Georgia, serif; }
    </style>
  </defs>
  <!-- Icône savon stylisée -->
  <rect x="4" y="12" width="36" height="26" rx="6" ry="6" fill="#C8A96E"/>
  <ellipse cx="22" cy="10" rx="8" ry="4" fill="#6B7B3A" opacity="0.7"/>
  <line x1="22" y1="6" x2="22" y2="2" stroke="#6B7B3A" stroke-width="2" stroke-linecap="round"/>
  <circle cx="22" cy="1" r="2" fill="#6B7B3A" opacity="0.6"/>
  <!-- Bulles -->
  <circle cx="14" cy="22" r="3" fill="#FDFAF5" opacity="0.5"/>
  <circle cx="24" cy="26" r="2" fill="#FDFAF5" opacity="0.4"/>
  <circle cx="30" cy="20" r="2.5" fill="#FDFAF5" opacity="0.35"/>
  <!-- Texte -->
  <text x="50" y="28" class="logo-text" font-size="18" font-weight="bold" fill="#3D2B1F">Savon de Marseille</text>
  <text x="50" y="46" class="logo-sub" font-size="11" fill="#6B7B3A" letter-spacing="2">LE PORTAIL DE RÉFÉRENCE</text>
</svg>
